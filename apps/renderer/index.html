<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' orlinx: https: http: ws: wss:; object-src 'none'; base-uri 'self'"
    />
    <script src="/theme-init.js"></script>
    <style>
      :root {
        color-scheme: dark;
        background: #0a0a0a;
      }

      :root[data-theme='light'] {
        color-scheme: light;
        background: #ffffff;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: inherit;
      }

      #root {
        height: 100%;
      }
    </style>
    <title>Orlinx</title>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
